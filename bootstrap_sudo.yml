---
- name: Configure passwordless sudo for ansible user
  hosts: apt_systems
  become: yes

  vars:
    sudoers_user: scott

  tasks:
    - name: Grant passwordless sudo to {{ sudoers_user }}
      ansible.builtin.copy:
        content: "{{ sudoers_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ sudoers_user }}"
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
