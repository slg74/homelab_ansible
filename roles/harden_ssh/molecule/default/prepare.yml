---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Install openssh-server
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: yes

    - name: Create sshd privilege separation directory
      ansible.builtin.file:
        path: /run/sshd
        state: directory
        mode: "0755"
