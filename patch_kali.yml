---
- name: Patch Kali Linux systems
  hosts: kali
  become: yes
  gather_facts: yes

  tasks:
    - name: Sync system clock via NTP
      ansible.builtin.shell: |
        if command -v chronyc &>/dev/null; then
          chronyc makestep
        else
          systemctl restart systemd-timesyncd
        fi
      changed_when: false

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Apply all updates (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        dpkg_options: "force-confold,force-confdef"
      register: patch_result

    - name: Remove orphaned packages
      ansible.builtin.apt:
        autoremove: yes
        purge: yes

    - name: Display patch output
      ansible.builtin.debug:
        var: patch_result.stdout_lines

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
        msg: "Rebooting to complete patch installation"
      when: reboot_required_file.stat.exists

    - name: Confirm reboot completed
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} rebooted successfully"
      when: reboot_required_file.stat.exists
